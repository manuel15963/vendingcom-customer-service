server:
  port: ${PORT:8082}

spring:
  application:
    name: vendingcom-customer-service

  # Perfil activo: 'local' por defecto. En la nube se pone SPRING_PROFILES_ACTIVE=prod
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  sql:
    init:
      mode: never

management:
  health:
    r2dbc:
      enabled: true

customer:
  audit-log:
    # Días de retención de la auditoría; un job semanal borra lo más antiguo.
    retention-days: ${AUDIT_LOG_RETENTION_DAYS:30}

springdoc:
  # En producción se puede desactivar la documentación con SPRINGDOC_ENABLED=false
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
